<style>
  body { background-color: #1a1a1a; color: #714498; font-family: 'Courier New', monospace; padding: 40px; }
  .template-box { border: 1px solid #714498; padding: 20px; max-width: 800px; }
  input { background: none; border: none; border-bottom: 1px dotted #714498; color: white; width: 100%; }
  label { font-weight: bold; display: block; margin-top: 10px; }
</style>

<div class="template-box">
  <h1>UNIVERSE REGISTRY TERMINAL</h1>
  <form id="universeForm">

    <input type="text" name="universeID" placeholder="e.g. SWS-9898">
    
    <label>GRAVITY LEVEL:</label>
    <input type="text" name="gravity" value="0.00000000006674">
    
    <label>REALITY MATERIAL:</label>
    <input type="text" name="material" value="Wood">
    
    <label>CLAIMANT USERNAME:</label>
    <input type="text" name="username" placeholder="Who governs this reality?">
    
    <button type="submit" style="margin-top:20px;">SUBMIT TO THE VOID</button>
  </form>
</div>
